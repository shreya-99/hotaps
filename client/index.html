<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- =============================================
         PRIMARY SEO META TAGS
         These are the most important for search engines.
         Update title/description to match your brand.
    ============================================= -->
    <title>House of Technology | Node.js, React, AWS, Flutter App Development</title>
    <meta name="description" content="House of Technology (HoTaps) is a premier software development agency specializing in Node.js, React.js, AWS Cloud, Android, iOS, and Flutter app development. Build scalable, modern digital products with us." />
    <meta name="keywords" content="nodejs development, reactjs development, aws cloud services, flutter app development, android app development, ios app development, software agency, web development company, mobile app development, HOTaps" />
    <meta name="author" content="House of Technology" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hotaps.com/" />

    <!-- =============================================
         OPEN GRAPH (Facebook, LinkedIn, WhatsApp previews)
    ============================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hotaps.com/" />
    <meta property="og:title" content="House of Technology | Premium App & Web Development" />
    <meta property="og:description" content="We craft scalable digital products using Node.js, React, AWS, Flutter, Android & iOS. Let's build something great together." />
    <meta property="og:image" content="https://hotaps.com/og-image.jpg" />
    <meta property="og:site_name" content="House of Technology" />
    <meta property="og:locale" content="en_US" />

    <!-- =============================================
         TWITTER / X CARD
    ============================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@hotaps" />
    <meta name="twitter:title" content="House of Technology | Premium Dev Agency" />
    <meta name="twitter:description" content="Node.js, React, AWS, Flutter, Android & iOS development. Ship faster with HoTaps." />
    <meta name="twitter:image" content="https://hotaps.com/og-image.jpg" />

    <!-- =============================================
         THEME & PWA
    ============================================= -->
    <meta name="theme-color" content="#00C9A7" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- =============================================
         GOOGLE FONTS
         DM Sans: clean, modern body font
         Outfit: geometric display font for headings
    ============================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- =============================================
         STRUCTURED DATA (JSON-LD)
         Helps Google understand your business type,
         show rich results, and rank better locally.
    ============================================= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "House of Technology",
      "alternateName": "HoTaps",
      "url": "https://hotaps.com",
      "logo": "https://hotaps.com/logo.png",
      "description": "Premium software development agency specializing in Node.js, React.js, AWS, Flutter, Android and iOS development.",
      "foundingDate": "2020",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-XXXXXXXXXX",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [
        "https://www.linkedin.com/company/hotaps",
        "https://twitter.com/hotaps",
        "https://github.com/hotaps"
      ],
      "service": [
        { "@type": "Service", "name": "Node.js Development" },
        { "@type": "Service", "name": "React.js Development" },
        { "@type": "Service", "name": "AWS Cloud Services" },
        { "@type": "Service", "name": "Flutter App Development" },
        { "@type": "Service", "name": "Android Development" },
        { "@type": "Service", "name": "iOS Development" }
      ]
    }
    </script>
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
